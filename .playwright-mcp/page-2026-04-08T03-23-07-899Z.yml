                              - listitem [ref=f2e919]:
                                - list [ref=f2e920]:
                                  - listitem [ref=f2e921]: 자동차매매업자는 자동차성능ㆍ상태점검기록부(가격조사ㆍ산정 부분 제외)에 기재된 내용을 고지하지 아니하거나 거짓으로 고지함으로써 매수인에게 재산상 손해가 발생한 경우에는 그 손해를 배상할 책임을 집니다.
                                  - listitem [ref=f2e922]: 자동차성능ㆍ상태점검자가 거짓 또는 오류가 있는 자동차성능ㆍ상태점검 내용을 제공하여 아래의 보증기간 또는 보증거리 이내에 자동차의 실제 성능ㆍ상태가 다른 경우, 자동차매매업자는 매수인의 재산상 손해를 배상할 책임을 지며, 자동차성능ㆍ상태점검자에게 이를 구상할 수 있습니다.(매수인이 자동차성능ㆍ상태점검자가 가입한 책임보험 등을 통해 별도로 배상받는 경우는 제외)
                                  - listitem [ref=f2e923]: 자동차인도일부터 보증기간은 ( )일, 보증거리는 ( )킬로미터로 합니다. (보증기간은 30일 이상, 보증거리는 2천킬로미터 이상이어야 하며, 그 중 먼저 도래한 것을 적용)
                                  - listitem [ref=f2e924]: 자동차매매업자는 자동차 자동차성능ㆍ상태점검기록부를 매수인에게 고지할 때 현행 자동차성능ㆍ상태점검자의 보증범위(국토교통부 고시)를 첨부하여 고지하여야 합니다. 동 보증범위는 ‘자동차성능ㆍ상태점검자의 보증범위’(국토교통부 고시)에 따르며, 법제처 국가법령정보센터 또는 국토교통부 홈페이지에서 확인할 수 있습니다.
                                  - listitem [ref=f2e925]: 자동차의 리콜에 관한 사항은 자동차리콜센터(www.car.go.kr)에서 확인할 수 있습니다.
                              - listitem [ref=f2e926]: 자동차의 구조ㆍ장치 등의 성능ㆍ상태를 고지하지 아니한 자나 점검한 내용을 거짓으로 고지한 자는 「자동차관리법」 제80조제6호 및 제7호에 따라 2년 이하의 징역 또는 2천만원 이하의 벌금에 처합니다.
                              - listitem [ref=f2e927]: 자동차성능ㆍ상태점검자가 거짓으로 자동차성능ㆍ상태 점검을 하거나 실제 점검한 내용과 다른 내용을 제공한 경우 「자동차관리법」 제80조제9호의2에 따라 2년 이하의 징역 또는 2천만원 이하의 벌금에 처하며, 「자동차관리법 제21조제2항 등의 규정에 따른 행정처분의 기준과 절차에 관한 규칙」 제5조제1항에 따라 1차 사업정지 30일, 2차 사업정지 90일, 3차 사업장 폐쇄의 행정처분을 받습니다.
                              - listitem [ref=f2e928]: ⑫ 사고이력 인정은 사고로 자동차 주요 골격 부위의 판금, 용접수리 및 교환이 있는 경우로 한정합니다. 단, 쿼터패널, 루프패널, 사이드실패널 부위는 절단, 용접 시에만 사고로 표기합니다. (후드, 프론트펜더, 도어, 트렁크리드 등 외판 부위 및 범퍼에 대한 판금, 용접수리 및 교환은 단순수리로서 사고에 포함되지 않습니다)
                              - listitem [ref=f2e929]: 자동차성능ㆍ상태점검은 국토교통부장관이 정하는 자동차성능ㆍ상태점검 방법에 따라야 합니다.
                              - listitem [ref=f2e930]: 「자동차관리법 시행규칙」 제120조제2항에 따라 자동차성능ㆍ상태점검기록부는 해당 기록부의 발급일을 기준으로 120일 이내에 이루어진 자동차 성능ㆍ상태점검으로 한정합니다
                              - listitem [ref=f2e931]:
                                - text: 체크항목 판단기준(예시)
                                - list [ref=f2e932]:
                                  - listitem [ref=f2e933]: "미세누유(미세누수): 해당부위에 오일(냉각수)이 비치는 정도로서 부품 노후로 인한 현상"
                                  - listitem [ref=f2e934]: "누유(누수): 해당부위에서 오일(냉각수)이 맺혀서 떨어지는 상태"
                                  - listitem [ref=f2e935]: "부식: 차량하부와 외판의 금속표면이 화학반응에 의해 금속이 아닌 상태로 상실되어 가는 현상(단순히 녹슬어 있는 상태는 제외합니다)"
                                  - listitem [ref=f2e936]: "침수: 자동차의 원동기, 변속기 등 주요장치 일부가 물에 잠긴 흔적이 있는 상태"
                                  - listitem [ref=f2e937]: "현재 주행거리: 자동차성능ㆍ상태점검 당시 해당 차량 주행거리계의 주행거리를 기록하되, 기록한 주행거리가 자동차전산정보처리조직(자동차관리정보시스템)으로부터 받은 주행거리(주행거리계 교체 정보 포함)보다 적은 경우 ‘특기사항 및 점검자의 의견’ 란에 이를 적어야 합니다."
                        - row "※ 자동차가격조사ㆍ산정의 보증에 관한 사항 등" [ref=f2e938]:
                          - cell "※ 자동차가격조사ㆍ산정의 보증에 관한 사항 등" [ref=f2e939]
                        - row "가격조사ㆍ산정자는 아래의 보증기간 또는 보증거리 이내에 자동차성능ㆍ상태점검기록부(가격조사ㆍ산정 부분 한정)에 적힌 내용에 허위 또는 오류가 있는 경우 계약 또는 관계법령에 따라 매수인에 대하여 책임을 집니다. ㆍ 자동차인도일부터 보증기간은 ( )일, 보증거리는 ( )킬로미터로 합니다. (보증기간은 30일 이상, 보증거리는 2천킬로미터 이상이어야 하며, 그 중 먼저 도래한 것을 적용합니다) 자동차매매업자는 매수인이 가격조사ㆍ산정을 원할 경우 가격조사ㆍ산정자가 해당 자동차 가격을 조사ㆍ산정하여 결과를 이 서식에 적도록 한 후, 반드시 매매계약을 체결하기 전에 매수인에게 서면으로 고지하여야 합니다. 이 경우 자동차매매업자는 가격조사ㆍ산정자에게 가격조사ㆍ산정을 의뢰하기 전에 매수인에게 가격조사ㆍ산정 비용을 안내하여야 합니다. 자동차가격은 보험개발원이 정한 차량기준가액을 기준가격으로 조사ㆍ산정하되, 기준서는 「자동차관리법」 제58조의4제1호에 해당하는 자는 기술사회에서 발행한 기준서를, 제2호에 해당하는 자는 한국자동차진단보증협회에서 발행한 기준서를 각각 적용하여야 하며, 기준가격과 기준서는 산정일 기준 가장 최근에 발행된 것을 적용합니다. 특기사항란은 가격조사ㆍ산정자의 자동차 성능ㆍ상태에 대한 견해가 성능ㆍ상태점검자의 견해와 다를 경우 표시합니다." [ref=f2e940]:
